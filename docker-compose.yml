name: invest-hub

x-api-env: &api-env
  DATABASE_URL: postgresql://investhub:investhub@postgres:5432/investhub?schema=public
  API_PORT: 4000
  FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
  APP_URL: ${APP_URL:-http://localhost:3000}
  API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
  AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-invest_hub_session}
  JWT_SECRET: ${JWT_SECRET:-invest-hub-local-session-secret}
  SESSION_SECRET: ${SESSION_SECRET:-invest-hub-local-session-secret}
  TOSS_CREDENTIAL_SECRET: ${TOSS_CREDENTIAL_SECRET:-invest-hub-local-dev-credential-secret}
  CREDENTIAL_ENCRYPTION_SECRET: ${CREDENTIAL_ENCRYPTION_SECRET:-invest-hub-local-dev-credential-secret}
  KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
  KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
  KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-}
  NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
  NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
  NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI:-}
  USD_KRW_RATE: ${USD_KRW_RATE:-1516.5}
  MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-real}
  REDIS_URL: ${REDIS_URL:-}
  ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
  TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  LOGO_DEV_API_KEY: ${LOGO_DEV_API_KEY:-}
  BRANDFETCH_API_KEY: ${BRANDFETCH_API_KEY:-}
  FRED_API_KEY: ${FRED_API_KEY:-}
  LOGO_UPLOAD_DIR: ${LOGO_UPLOAD_DIR:-/app/uploads/logos}

services:
  postgres:
    image: postgres:16-alpine
    container_name: invest-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: investhub
      POSTGRES_PASSWORD: investhub
      POSTGRES_DB: investhub
    ports:
      - "5433:5432"
    volumes:
      - invest_hub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investhub -d investhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: invest-hub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment: *api-env
    ports:
      - "4000:4000"
    volumes:
      - invest_hub_uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: invest-hub-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

  seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: tools
    depends_on:
      postgres:
        condition: service_healthy
    environment: *api-env
    command: sh -c "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && npm run seed -w apps/api"

volumes:
  invest_hub_pg:
  invest_hub_uploads:
